database:
  dsn_env: INTAKE_DATABASE_DSN
  schema: intake

readwise:
  api_token_env: READWISE_API_TOKEN
  base_url: https://readwise.io/api/v3
  page_size: 100

pinboard:
  api_token_env: PINBOARD_API_TOKEN
  base_url: https://api.pinboard.in/v1

review:
  staging_root: ./review/staging
  daily_root: ./review/daily
  batch_size: 25
  privacy: private

final_notes:
  default_root: ./out/knowledge

classifier:
  mode: rules
  confidence_threshold: 0.75

active_context:
  interests_file: ./config/active-context.example.yaml

destinations:
  personal:
    label: Personal
    path: ./out/knowledge/personal
    private: true
  professional:
    label: Professional
    path: ./out/knowledge/professional
    private: true
  ayra_corporate_internal:
    label: Ayra Corporate
    path: ./out/knowledge/ayra/corporate-internal
    private: true
  ayra_confidential:
    label: Ayra Confidential
    path: ./out/knowledge/ayra/confidential
    private: true
